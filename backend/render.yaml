# ZapPay Backend — Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  # ── API Web Service ──────────────────────────────────────────────────
  - type: web
    name: zappay-api
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/zappay  # <-- CHANGE THIS
    branch: main
    rootDir: backend
    dockerfilePath: Dockerfile
    dockerContext: .

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_VERSION
        value: "1.0.0"

      # Supabase PostgreSQL
      - key: DATABASE_URL
        sync: false  # Manual entry in Render dashboard
      - key: DATABASE_POOL_SIZE
        value: "3"
      - key: DATABASE_MAX_OVERFLOW
        value: "3"

      # Upstash Redis
      - key: REDIS_URL
        sync: false  # Manual entry
      - key: REDIS_MAX_CONNECTIONS
        value: "5"

      # Security
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # CORS — allow your Render frontend domain
      - key: CORS_ORIGINS
        value: "http://localhost:3000,http://localhost:5173,https://zappay.onrender.com"

      # Rate limiting (disable if no Redis)
      - key: RATE_LIMIT_ENABLED
        value: "true"

      # Monitoring (optional)
      - key: SENTRY_DSN
        sync: false

      # SMS (optional)
      - key: SMS_API_KEY
        sync: false

      # Email (optional)
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false

    healthCheckPath: /health
    autoDeploy: true

  # ── Celery Worker (optional — needs paid Redis on Render) ────────────
  # Uncomment if you have a Redis add-on:
  # - type: worker
  #   name: zappay-celery-worker
  #   runtime: docker
  #   repo: https://github.com/YOUR_USERNAME/zappay
  #   branch: main
  #   rootDir: backend
  #   dockerfilePath: Dockerfile
  #   dockerContext: .
  #   command: celery -A app.celery_app worker --loglevel=info
  #   envVars:
  #     - key: ENVIRONMENT
  #       value: production
  #     - key: DATABASE_URL
  #       sync: false
  #     - key: REDIS_URL
  #       sync: false
  #     - key: SECRET_KEY
  #       sync: false
